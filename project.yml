name: FinanceTracker
options:
  bundleIdPrefix: com.joao
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  FinanceTracker:
    type: application
    platform: iOS
    sources:
      - FinanceTracker
    settings:
      base:
        INFOPLIST_FILE: FinanceTracker/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.joao.financas
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
